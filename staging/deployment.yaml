apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
  namespace: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
        - name: my-app
          image: anhduc8702/my-microservices-app:latest   # Jenkins sẽ thay dòng này
          ports:
            - containerPort: 3000
